<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width" />
        <title>04-02</title>
       <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    </head>
    <body>
        <h1>Lab 04</h1>
        <div id="res"></div>
        <button onclick="Get()">GET</button>
        <div style="padding: 20px;">
            <div class="row">
                <label class="col-2">ID</label>
                <input type="text" class="col-3" id="ID" />
            </div>
             <div class="row">
                <label class="col-2">SNP</label>
                <input type="text" class="col-3" id="SNP" />
            </div>
             <div class="row">
                <label class="col-2">BDAY</label>
                <input type="date" class="col-3" id="BDAY" />
            </div>
             <div class="row">
                <button class="col-2" onclick="Post()">POST</button>
            </div>
            <div class="row">
                <button class="col-2" onclick="Put()">PUT</button>
            </div>
            <div class="row">
                <button class="col-2" onclick="Delete()">DELETE</button>
            </div>
        </div>
        <script>
            document.addEventListener('DOMContentLoaded', Get);
            function Post(){
                fetch('http://localhost:5000/api/db', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({name:SNP.value, bday:BDAY.value})
                    })
                    .then(res =>{
                        return res.json();
                    })
                    .then(data => {
                        console.log(data);
                        Get();
                    });
                };
                function Put(){
                fetch('http://localhost:5000/api/db', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({id: ID.value, name:SNP.value, bday:BDAY.value})
                    })
                    .then(res =>{
                        console.log(res);
                        return res.json();
                    })
                    .then(data => {
                        console.log(data);
                        Get();
                    });
                };
                function Get(){
                    fetch('http://localhost:5000/api/db', {
                        method: 'GET',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        }
                    })
                    .then(res =>{
                        return res.json();
                    })
                    .then(data => {
                        console.log(data);
                        res.innerHTML = '';
                        data.forEach(el => {
                            res.innerHTML += (el.id + ' ' + el.name + ' ' + el.bday + '<br/>');
                        });
                    });
                }
                function Delete(){
                    fetch(`http://localhost:5000/api/db?id=${ID.value}`, {
                        method: 'DELETE',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        }
                    })
                    .then(res =>{
                        return res.json();
                    })
                    .then(data => {
                        console.log(data);
                        Get();
                    });
                }
        </script>
    </body>
</html>
