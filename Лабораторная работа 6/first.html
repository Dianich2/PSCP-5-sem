<!DOCTYPE html>
<html>
    <title>06-02</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <body>
        <form action="/send" method="POST">
            <div style="padding: 20px;">
                <div class="row">
                    <label class="col-2" style="margin-bottom: 15px; padding: 5px;">Почтовый ящик отправителя</label>
                    <input type="email" style="margin-bottom: 15px; padding: 5px;" class="col-3" id="SENDER" name="sender" />
                </div>
                <div class="row">
                    <label class="col-2" style="margin-bottom: 15px; padding: 5px;">Почтовый ящик получателя</label>
                    <input type="email" style="margin-bottom: 15px; padding: 5px;" class="col-3" id="RECEIVER" name="receiver" />
                </div>
                <div class="row">
                    <label class="col-2" style="margin-bottom: 15px; padding: 5px;">Пересылаемое сообщение</label>
                    <input type="text" style="margin-bottom: 15px; padding: 5px;" class="col-3" id="MESSAGE" name="message" />
                </div>
                <div class="row">
                    <button class="col-2" type="submit">Отправить</button>
                </div>
            </div>
        </form>
    </body>
</html>
